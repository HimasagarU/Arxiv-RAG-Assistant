version: "3.8"

services:
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: arxiv-rag-api
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data:ro
    environment:
      - CHROMA_DIR=/app/data/chroma_db
      - BM25_INDEX_PATH=/app/data/bm25_index.pkl
      - DB_PATH=/app/data/arxiv_papers.db
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
